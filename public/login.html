<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Worless — Connexion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f0f; color: #fff; font-family: 'Inter', system-ui, sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-box { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 40px; width: 100%; max-width: 380px; }
    .logo { font-size: 22px; font-weight: 700; color: #22c55e; margin-bottom: 8px; }
    .subtitle { color: #666; font-size: 14px; margin-bottom: 32px; }
    label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; }
    input { width: 100%; background: #111; border: 1px solid #2a2a2a; border-radius: 8px; padding: 12px 14px; color: #fff; font-size: 15px; outline: none; margin-bottom: 16px; }
    input:focus { border-color: #22c55e; }
    button { width: 100%; background: #22c55e; color: #000; font-weight: 600; font-size: 15px; border: none; border-radius: 8px; padding: 13px; cursor: pointer; }
    button:hover { background: #16a34a; }
    .error { color: #ef4444; font-size: 13px; margin-top: 12px; display: none; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">Worless</div>
    <div class="subtitle">Garage Martin — Espace gestion</div>
    <form id="loginForm">
      <label>Email</label>
      <input type="email" id="email" placeholder="garage@worless.fr" required>
      <label>Mot de passe</label>
      <input type="password" id="password" placeholder="••••••••" required>
      <button type="submit">Se connecter</button>
      <div class="error" id="error">Identifiants incorrects</div>
    </form>
  </div>
  <script>
    if (localStorage.getItem('token')) window.location.href = '/';
    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
      });
      if (res.ok) {
        const data = await res.json();
        localStorage.setItem('token', data.token);
        window.location.href = '/';
      } else {
        document.getElementById('error').style.display = 'block';
      }
    });
  </script>
</body>
</html>
